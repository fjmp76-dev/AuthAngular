<div class="dashboard-container">
  <mat-card class="dashboard-card">
    <mat-card-header>
      <mat-icon mat-card-avatar>account_circle</mat-icon>
      <mat-card-title>Dashboard</mat-card-title>
      <mat-card-subtitle>Sesión activa</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <div class="info-row">
        <mat-icon>person</mat-icon>
        <span>Usuario: <strong>{{ user()?.username }}</strong></span>
      </div>

      <div class="info-row">
        <mat-icon>badge</mat-icon>
        <span>Rol: <strong>{{ user()?.role }}</strong></span>
      </div>

      <div class="info-row">
        <mat-icon>schedule</mat-icon>
        <span>Token expira: <strong>{{ user()?.expiresAt | date:'HH:mm:ss' }}</strong></span>
      </div>
    </mat-card-content>

    <mat-card-actions>
      <button mat-raised-button color="primary" routerLink="/captura">
        <mat-icon>edit_note</mat-icon>
        Ir a Captura
      </button>
      <button mat-raised-button color="warn" (click)="logout()">
        <mat-icon>logout</mat-icon>
        Cerrar sesión
      </button>
    </mat-card-actions>
  </mat-card>
</div>
