<div class="captura-container">
  <mat-card class="captura-card">

    <mat-card-header>
      <mat-icon mat-card-avatar>edit_note</mat-icon>
      <mat-card-title>Formulario de Captura</mat-card-title>
      <mat-card-subtitle>
        Token expira: <strong>{{ authService.currentUser()?.expiresAt | date:'HH:mm:ss' }}</strong>
      </mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">

        <div class="row">
          <mat-form-field appearance="outline">
            <mat-label>Nombre</mat-label>
            <input matInput formControlName="nombre" />
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Apellido</mat-label>
            <input matInput formControlName="apellido" />
          </mat-form-field>
        </div>

        <div class="row">
          <mat-form-field appearance="outline">
            <mat-label>Email</mat-label>
            <input matInput formControlName="email" type="email" />
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Teléfono</mat-label>
            <input matInput formControlName="telefono" />
          </mat-form-field>
        </div>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Dirección</mat-label>
          <input matInput formControlName="direccion" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Ciudad</mat-label>
          <input matInput formControlName="ciudad" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Notas</mat-label>
          <textarea matInput formControlName="notas" rows="3"></textarea>
        </mat-form-field>

        <div class="actions">
          <button mat-raised-button color="primary"
                  type="submit"
                  [disabled]="form.invalid">
            <mat-icon>save</mat-icon>
            Guardar
          </button>

          <button mat-stroked-button type="button" (click)="form.reset()">
            <mat-icon>clear</mat-icon>
            Limpiar
          </button>

        </div>

      </form>
    </mat-card-content>

     <mat-card-content> 
      <div class="nav-actions">
        <button mat-raised-button color="primary" routerLink="/dashboard">
          <mat-icon>dashboard</mat-icon>
          Ir a Dashboard
        </button>
      </div>
     </mat-card-content>
  </mat-card>
</div>
