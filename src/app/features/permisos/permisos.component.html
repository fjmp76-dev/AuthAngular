@if (!canAccess()) {
  <app-no-access />
} @else {
  <div class="permisos-container">
    <mat-card>
      <mat-card-header>
        <mat-icon mat-card-avatar>admin_panel_settings</mat-icon>
        <mat-card-title>Permisos</mat-card-title>
        <mat-card-subtitle>
          Usuario: <strong>{{ user()?.username }}</strong>
        </mat-card-subtitle>
      </mat-card-header>

      <mat-card-content>
        <table mat-table [dataSource]="user()?.permissions ?? []" class="full-width">

          <ng-container matColumnDef="screen">
            <th mat-header-cell *matHeaderCellDef>Pantalla</th>
            <td mat-cell *matCellDef="let row">
              <strong>{{ row.screen }}</strong>
            </td>
          </ng-container>

          <ng-container matColumnDef="level">
            <th mat-header-cell *matHeaderCellDef>Nivel</th>
            <td mat-cell *matCellDef="let row">
              <mat-chip [color]="getLevelColor(row.level)" highlighted>
                {{ getLevelLabel(row.level) }}
              </mat-chip>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
      </mat-card-content>
    </mat-card>
  </div>
}
